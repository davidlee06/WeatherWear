<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WeatherWear</title>
        <!-- add here in case browser doesn't make automatic request for favicon -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <!-- css file for this page -->
        <link href="/css/index.css" rel="stylesheet" />
        <!-- compatibility for browsers -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body>
        <div id="page-container">
            <!-- WeatherWear title -->
            <div id="title">WeatherWear</div>
            <!-- search bar -->
            <div id="center-container">
                <form action="/city" method="POST">
                    <div id="search-container">
                        <!-- TODO style the textbox and the search button they look terrible as of right now -->
                        <input
                            class="form-control"
                            placeholder="Enter City Name (Ex: New York, NY, US)"
                            name="cityName"
                        />

                        <input type="submit" value="Search" />
                    </div>
                </form>
            </div>
            <!-- footer -->
            <div id="footer-container">
                <div>Created By Tim Rolshud, David Lee, Nico Kichukov, 2022 Congressional App Challenge</div>
            </div>
        </div>
    </body>
</html>
