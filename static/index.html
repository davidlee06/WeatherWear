<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WeatherWear</title>
        <!-- add here in case browser doesn't make automatic request for favicon -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <!-- css for this page -->
        <link href="/css/index.css" rel="stylesheet" />
        <!-- compatibility for browsers -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="UTF-8" />
    </head>
    <body>
        <div id="page-container">
            <!-- WeatherWear title -->
            <div id="title">WeatherWear</div>
            <!-- search bar -->
            <div id="center-container">
                <div id="search-container">
                    <!-- TODO style the textbox and the search button they look terrible as of right now -->
                    <input
                        id="textbox"
                        type="text"
                        placeholder="Enter City Name (Ex: New York, NY)"
                        name="rawText"
                        id="rawTextInput"
                    />
                    <button type="button" id="search-button">Search</button>
                </div>
            </div>
            <!-- footer -->
            <div id="footer-container">
                <div>Created By Tim Rolshud, David Lee, Nico Kichukov, 2022 Congressional App Challenge</div>
            </div>
        </div>
        <script src="/js/index.js"></script>
        <!-- invisible form -->
        <form id="hidden-form" action="/city" method="POST">
            <input id="city" type="hidden" name="city" value="n/a" />
            <input id="state" type="hidden" name="state" value="n/a" />
        </form>
    </body>
</html>
